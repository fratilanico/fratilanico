<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f7ff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#7b5ea7;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ff00cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f7ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff00cc;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="400" fill="#080810"/>
  <rect width="1200" height="400" fill="url(#bgGrid)" opacity="0.3"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f7ff" stroke-width="0.3" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- PCB Circuit traces - horizontal lines -->
  <line x1="0" y1="60" x2="380" y2="60" stroke="#00f7ff" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="820" y1="60" x2="1200" y2="60" stroke="#ff00cc" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="0" y1="340" x2="380" y2="340" stroke="#ff00cc" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="820" y1="340" x2="1200" y2="340" stroke="#00f7ff" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>

  <!-- PCB traces vertical connectors -->
  <line x1="60" y1="60" x2="60" y2="120" stroke="#00f7ff" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="60" y1="280" x2="60" y2="340" stroke="#ff00cc" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="1140" y1="60" x2="1140" y2="120" stroke="#ff00cc" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <line x1="1140" y1="280" x2="1140" y2="340" stroke="#00f7ff" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>

  <!-- Corner circuit nodes -->
  <circle cx="60" cy="60" r="5" fill="#00f7ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="60" cy="340" r="5" fill="#ff00cc" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1140" cy="60" r="5" fill="#ff00cc" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1140" cy="340" r="5" fill="#00f7ff" opacity="0.8" filter="url(#glow)"/>

  <!-- Horizontal traces mid section -->
  <line x1="100" y1="120" x2="380" y2="120" stroke="#00f7ff" stroke-width="1" opacity="0.25"/>
  <line x1="820" y1="280" x2="1100" y2="280" stroke="#ff00cc" stroke-width="1" opacity="0.25"/>

  <!-- Small circuit nodes scattered -->
  <circle cx="200" cy="120" r="3" fill="#00f7ff" opacity="0.5"/>
  <circle cx="300" cy="60" r="3" fill="#7b5ea7" opacity="0.5"/>
  <circle cx="900" cy="60" r="3" fill="#ff00cc" opacity="0.5"/>
  <circle cx="1000" cy="280" r="3" fill="#00f7ff" opacity="0.5"/>

  <!-- Pixel squares decoration (pixel art aesthetic) -->
  <rect x="90" y="160" width="8" height="8" fill="#00f7ff" opacity="0.4"/>
  <rect x="102" y="160" width="8" height="8" fill="#00f7ff" opacity="0.2"/>
  <rect x="90" y="172" width="8" height="8" fill="#00f7ff" opacity="0.2"/>

  <rect x="1100" y="200" width="8" height="8" fill="#ff00cc" opacity="0.4"/>
  <rect x="1088" y="200" width="8" height="8" fill="#ff00cc" opacity="0.2"/>
  <rect x="1100" y="212" width="8" height="8" fill="#ff00cc" opacity="0.2"/>

  <!-- Main APEX OS text with gradient -->
  <text x="600" y="230"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="110"
        font-weight="900"
        text-anchor="middle"
        fill="url(#textGrad)"
        filter="url(#strongGlow)"
        letter-spacing="8">APEX OS</text>

  <!-- Tagline -->
  <text x="600" y="285"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="18"
        font-weight="400"
        text-anchor="middle"
        fill="#00f7ff"
        opacity="0.85"
        letter-spacing="6">AI AGENT SWARM · BUILT ON AZURE · RUNS THE FUTURE</text>

  <!-- Decorative line under tagline -->
  <line x1="350" y1="300" x2="850" y2="300" stroke="url(#traceGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Top pixel-art border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#textGrad)" opacity="0.8"/>
  <!-- Bottom pixel-art border accent -->
  <rect x="0" y="397" width="1200" height="3" fill="url(#textGrad)" opacity="0.8"/>
</svg>
